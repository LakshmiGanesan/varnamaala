<!DOCTYPE html>
<html lang="sa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanskrit Varṇamālā Mandala · v2.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+Devanagari:wght@300;400;500;600&display=swap');

/* ── CSS VARIABLES — dark (default) ── */
:root {
  --bg:           #04080a;
  --header-title: #a8c9d4;
  --header-sub:   rgba(168,201,212,0.32);
  --badge-text:   rgba(168,201,212,0.48);
  --badge-border: rgba(168,201,212,0.20);
  --ring-bold:    rgba(168,201,212,0.42);
  --ring-soft:    rgba(168,201,212,0.18);
  --divider:      rgba(168,201,212,0.52);
  --glow-a:       rgba(168,201,212,0.08);
  --glow-b:       rgba(168,201,212,0.02);
  --rim:          rgba(168,201,212,0.18);
  --tick:         rgba(168,201,212,0.22);
  --ctr-fill:     #060a0d;
  --ctr-stroke:   rgba(168,201,212,0.42);
  --ctr-inner:    rgba(168,201,212,0.10);
  --ctr-om:       rgba(168,201,212,0.82);
  --name-fill:    rgba(232,244,248,0.92);
  --rom-opacity:  cc;
  --hit-hover:    rgba(255,255,255,0.04);
  --tt-bg:        rgba(4,8,10,0.97);
  --tt-border:    rgba(168,201,212,0.33);
  --tt-cat:       rgba(168,201,212,0.42);
  --tt-dev:       #e8f4f8;
  --tt-rom:       rgba(168,201,212,0.72);
  --tt-name:      rgba(232,244,248,0.70);
  --tt-desc:      rgba(232,244,248,0.52);
  --leg-text:     rgba(232,244,248,0.45);
  --attr-text:    rgba(168,201,212,0.38);
  --mbnd-opacity: 0.22;
  --nm-opacity:   0.10;
  --v-opacity:    0.26;
}

/* ── LIGHT MODE ── */
html.light {
  --bg:           #f6f3ec;
  --header-title: #2a6070;
  --header-sub:   rgba(42,96,112,0.50);
  --badge-text:   rgba(42,96,112,0.55);
  --badge-border: rgba(42,96,112,0.22);
  --ring-bold:    rgba(30,70,85,0.42);
  --ring-soft:    rgba(30,70,85,0.16);
  --divider:      rgba(30,70,85,0.45);
  --glow-a:       rgba(168,201,212,0.06);
  --glow-b:       rgba(168,201,212,0.01);
  --rim:          rgba(30,70,85,0.20);
  --tick:         rgba(30,70,85,0.20);
  --ctr-fill:     #eceae2;
  --ctr-stroke:   rgba(30,70,85,0.45);
  --ctr-inner:    rgba(30,70,85,0.10);
  --ctr-om:       rgba(30,70,85,0.78);
  --name-fill:    rgba(15,10,5,0.82);
  --rom-opacity:  bb;
  --hit-hover:    rgba(0,0,0,0.04);
  --tt-bg:        rgba(246,243,236,0.98);
  --tt-border:    rgba(42,96,112,0.32);
  --tt-cat:       rgba(42,96,112,0.48);
  --tt-dev:       #0a1e24;
  --tt-rom:       rgba(42,96,112,0.75);
  --tt-name:      rgba(15,30,35,0.72);
  --tt-desc:      rgba(15,30,35,0.55);
  --leg-text:     rgba(15,10,5,0.55);
  --attr-text:    rgba(42,96,112,0.48);
  --mbnd-opacity: 0.28;
  --nm-opacity:   0.07;
  --v-opacity:    0.32;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;font-family:'EB Garamond',serif;
  transition:background 0.4s;
}

/* ── TOGGLE ── */
.toggle-wrap{
  position:fixed;top:16px;right:20px;z-index:1000;
}
.toggle-btn{
  display:flex;align-items:center;gap:7px;
  font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.12em;
  color:var(--badge-text);background:var(--bg);
  border:1px solid var(--ring-bold);border-radius:20px;
  padding:7px 16px;cursor:pointer;
  transition:background 0.3s,color 0.3s,border-color 0.3s;
  text-transform:uppercase;box-shadow:0 2px 14px rgba(0,0,0,0.3);
}
.toggle-btn:hover{color:var(--header-title);border-color:var(--header-title);}
.toggle-icon{font-size:0.95rem;line-height:1;}

/* ── HEADER ── */
header{text-align:center;padding:28px 20px 6px;}
.h-en{
  font-family:'Cinzel',serif;font-weight:700;
  font-size:clamp(1rem,2.5vw,1.7rem);letter-spacing:0.25em;
  color:var(--header-title);text-transform:uppercase;transition:color 0.4s;
}
.h-sa{
  font-family:'Noto Serif Devanagari',serif;
  font-size:clamp(1rem,2.6vw,1.8rem);color:var(--header-sub);
  margin-top:2px;letter-spacing:0.05em;transition:color 0.4s;
}
.h-sub{
  font-family:'EB Garamond',serif;font-style:italic;
  color:var(--header-sub);font-size:0.8rem;letter-spacing:0.22em;margin-top:3px;
}
.pi-badge{
  display:inline-block;margin-top:7px;font-family:'Cinzel',serif;font-size:0.6rem;
  letter-spacing:0.18em;color:var(--badge-text);
  border:1px solid var(--badge-border);border-radius:20px;padding:2px 12px;
  transition:color 0.4s,border-color 0.4s;
}

.wrap{width:min(95vw,840px);aspect-ratio:1;margin:6px auto 0;}
svg{width:100%;height:100%;overflow:visible;}

/* ── TOOLTIP ── */
#tt{
  position:fixed;background:var(--tt-bg);border:1px solid var(--tt-border);
  border-radius:8px;padding:12px 15px;pointer-events:none;opacity:0;
  transition:opacity .15s;z-index:999;min-width:210px;max-width:265px;
  box-shadow:0 8px 32px rgba(0,0,0,0.25);
}
#tt.on{opacity:1;}
.tt-cat{font-family:'Cinzel',serif;font-size:.58rem;color:var(--tt-cat);
  letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px;}
.tt-dev{font-family:'Noto Serif Devanagari',serif;font-size:2.4rem;
  color:var(--tt-dev);line-height:1.1;margin-bottom:1px;}
.tt-rom{font-family:'EB Garamond',serif;font-style:italic;font-size:1rem;
  color:var(--tt-rom);margin-bottom:4px;}
.tt-name{font-family:'Cinzel',serif;font-size:.66rem;color:var(--tt-name);
  letter-spacing:.08em;margin-bottom:3px;}
.tt-desc{font-size:.73rem;color:var(--tt-desc);line-height:1.55;margin-bottom:6px;}
.tt-tag{display:inline-block;font-family:'Cinzel',serif;font-size:.57rem;letter-spacing:.1em;
  padding:2px 9px;border-radius:20px;background:rgba(168,201,212,.09);
  border:1px solid rgba(168,201,212,.2);}

/* ── FOOTER ── */
footer{display:flex;flex-wrap:wrap;justify-content:center;
  gap:5px 18px;padding:12px 20px 6px;max-width:820px;}
.leg{display:flex;align-items:center;gap:6px;font-family:'Cinzel',serif;
  font-size:.58rem;color:var(--leg-text);letter-spacing:.06em;transition:color 0.4s;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.leg-div{width:100%;text-align:center;color:var(--badge-text);
  font-size:.54rem;letter-spacing:.1em;padding:2px 0;font-family:'Cinzel',serif;}
.attribution{
  width:100%;text-align:center;padding:12px 0 28px;
  font-family:'EB Garamond',serif;font-style:italic;
  font-size:0.78rem;color:var(--attr-text);
  letter-spacing:0.12em;transition:color 0.4s;
}

/* ── PHONEME KEY ── */
.tt-translit-wrap{
  margin:6px 0 4px;
  padding:7px 10px;
  background:rgba(168,201,212,0.06);
  border-left:2px solid var(--header-title);
  border-radius:0 5px 5px 0;
}
.tt-translit-head{
  font-family:'Cinzel',serif;font-size:0.53rem;
  letter-spacing:0.14em;color:var(--tt-cat);
  text-transform:uppercase;margin-bottom:4px;
}
.tt-translit-word{
  font-family:'EB Garamond',serif;
  font-size:1.05rem;line-height:1.3;
  color:var(--tt-desc);
}
.tt-translit-word .ph-hi{
  color:var(--header-title);font-weight:700;
  font-size:1.18rem;
}
.tt-translit-unique{
  font-family:'EB Garamond',serif;font-style:italic;
  font-size:0.78rem;color:var(--tt-desc);opacity:0.7;
}

/* ── PRINT ── */
@media print{
  .toggle-wrap{display:none!important;}
  #tt{display:none!important;}
}
</style>
</head>
<body>

<div class="toggle-wrap">
  <button class="toggle-btn" id="toggleBtn" onclick="toggleMode()">
    <span class="toggle-icon" id="toggleIcon">☀️</span>
    <span id="toggleLabel">Light</span>
  </button>
</div>

<header>
  <div class="h-en">Sanskrit Varṇamālā</div>
  <div class="h-sa">संस्कृत वर्णमाला</div>
  <div class="h-sub">The Garland of Sounds · Structural Mandala</div>
  <div class="pi-badge">π · v2.0 · Phoneme Key</div>
</header>

<div class="wrap"><svg id="svg" viewBox="-420 -420 840 840"></svg></div>
<div id="tt"></div>
<footer id="footer"></footer>
<div class="attribution">Visualization by Lakshmi Ganesan &nbsp;·&nbsp; 2026 &nbsp;·&nbsp; Built with Claude</div>

<script>
// ── THEME
let isLight = false;
function toggleMode(){
  isLight = !isLight;
  document.documentElement.classList.toggle('light', isLight);
  document.getElementById('toggleIcon').textContent = isLight ? '🌙' : '☀️';
  document.getElementById('toggleLabel').textContent = isLight ? 'Dark' : 'Light';
  redraw();
}
function cv(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

// ── COLOURS
const PC={
  Guttural:'#e86055', Palatal:'#e8a830', Cerebral:'#48c870',
  Dental:'#4888d8',   Labial:'#c060d0',
  SemiVowel:'#38c8c0',Sibilant:'#98d840',Aspirate:'#d4a050',
};
const VC={short:'#f5c030',long:'#f08030',diphth:'#60b0f0',special:'#b088e0'};
const MANNER_OP=[0.88,0.55,0.28,0.58,0.82];

// ── VOWELS
const VOWELS=[
  {dev:'अ', rom:'a',  type:'short',  skt:'hṛsva a',   placeS:'Kaṇṭhya',        desc:'Short open central · the primordial sound'},
  {dev:'आ', rom:'ā',  type:'long',   skt:'dīrgha ā',  placeS:'Kaṇṭhya',        desc:'Long open central · sustained breath'},
  {dev:'इ', rom:'i',  type:'short',  skt:'hṛsva i',   placeS:'Tālavya',        desc:'Short front close vowel'},
  {dev:'ई', rom:'ī',  type:'long',   skt:'dīrgha ī',  placeS:'Tālavya',        desc:'Long front close vowel'},
  {dev:'उ', rom:'u',  type:'short',  skt:'hṛsva u',   placeS:'Oṣṭhya',         desc:'Short back close vowel'},
  {dev:'ऊ', rom:'ū',  type:'long',   skt:'dīrgha ū',  placeS:'Oṣṭhya',         desc:'Long back close vowel'},
  {dev:'ऋ', rom:'ṛ',  type:'short',  skt:'hṛsva ṛ',   placeS:'Mūrdhanya',      desc:'Short vocalic R'},
  {dev:'ॠ', rom:'ṝ',  type:'long',   skt:'dīrgha ṝ',  placeS:'Mūrdhanya',      desc:'Long vocalic R'},
  {dev:'ऌ', rom:'ḷ',  type:'short',  skt:'hṛsva ḷ',   placeS:'Dantya',         desc:'Short vocalic L'},
  {dev:'ए', rom:'e',  type:'diphth', skt:'e',         placeS:'Kaṇṭha-tālavya', desc:'Long palatal vowel · a+i saṃdhi'},
  {dev:'ऐ', rom:'ai', type:'diphth', skt:'ai',        placeS:'Kaṇṭha-tālavya', desc:'Diphthong · a+e saṃdhi'},
  {dev:'ओ', rom:'o',  type:'diphth', skt:'o',         placeS:'Kaṇṭhoṣṭhya',    desc:'Long labial vowel · a+u saṃdhi'},
  {dev:'औ', rom:'au', type:'diphth', skt:'au',        placeS:'Kaṇṭhoṣṭhya',    desc:'Diphthong · a+o saṃdhi'},
  {dev:'अं',rom:'aṃ', type:'special',skt:'anusvāra',  placeS:'Nāsikya',        desc:'Nasalisation of preceding vowel'},
  {dev:'अः',rom:'aḥ', type:'special',skt:'visarga',   placeS:'Visarjanīya',     desc:'Voiceless aspiration of preceding vowel'},
];

// ── CLASSIFIED (5 × 5 = 25)
const CLASSIFIED=[
  {dev:'क',rom:'ka', place:'Guttural', placeS:'Kaṇṭhya',  manner:1,mannerS:'Alpaprāṇa karkasha',desc:'Non-aspirated voiceless velar stop'},
  {dev:'ख',rom:'kha',place:'Guttural', placeS:'Kaṇṭhya',  manner:2,mannerS:'Mahāprāṇa karkasha', desc:'Aspirated voiceless velar stop'},
  {dev:'ग',rom:'ga', place:'Guttural', placeS:'Kaṇṭhya',  manner:3,mannerS:'Alpaprāṇa mṛdu',    desc:'Non-aspirated voiced velar stop'},
  {dev:'घ',rom:'gha',place:'Guttural', placeS:'Kaṇṭhya',  manner:4,mannerS:'Mahāprāṇa mṛdu',    desc:'Aspirated voiced velar stop'},
  {dev:'ङ',rom:'ṅa', place:'Guttural', placeS:'Kaṇṭhya',  manner:5,mannerS:'Anunāsika',         desc:'Voiced velar nasal'},
  {dev:'च',rom:'ca', place:'Palatal',  placeS:'Tālavya',  manner:1,mannerS:'Alpaprāṇa karkasha',desc:'Non-aspirated voiceless palatal affricate'},
  {dev:'छ',rom:'cha',place:'Palatal',  placeS:'Tālavya',  manner:2,mannerS:'Mahāprāṇa karkasha', desc:'Aspirated voiceless palatal affricate'},
  {dev:'ज',rom:'ja', place:'Palatal',  placeS:'Tālavya',  manner:3,mannerS:'Alpaprāṇa mṛdu',    desc:'Non-aspirated voiced palatal affricate'},
  {dev:'झ',rom:'jha',place:'Palatal',  placeS:'Tālavya',  manner:4,mannerS:'Mahāprāṇa mṛdu',    desc:'Aspirated voiced palatal affricate'},
  {dev:'ञ',rom:'ña', place:'Palatal',  placeS:'Tālavya',  manner:5,mannerS:'Anunāsika',         desc:'Voiced palatal nasal'},
  {dev:'ट',rom:'ṭa', place:'Cerebral', placeS:'Mūrdhanya',manner:1,mannerS:'Alpaprāṇa karkasha',desc:'Non-aspirated voiceless retroflex stop'},
  {dev:'ठ',rom:'ṭha',place:'Cerebral', placeS:'Mūrdhanya',manner:2,mannerS:'Mahāprāṇa karkasha', desc:'Aspirated voiceless retroflex stop'},
  {dev:'ड',rom:'ḍa', place:'Cerebral', placeS:'Mūrdhanya',manner:3,mannerS:'Alpaprāṇa mṛdu',    desc:'Non-aspirated voiced retroflex stop'},
  {dev:'ढ',rom:'ḍha',place:'Cerebral', placeS:'Mūrdhanya',manner:4,mannerS:'Mahāprāṇa mṛdu',    desc:'Aspirated voiced retroflex stop'},
  {dev:'ण',rom:'ṇa', place:'Cerebral', placeS:'Mūrdhanya',manner:5,mannerS:'Anunāsika',         desc:'Voiced retroflex nasal'},
  {dev:'त',rom:'ta', place:'Dental',   placeS:'Dantya',   manner:1,mannerS:'Alpaprāṇa karkasha',desc:'Non-aspirated voiceless dental stop'},
  {dev:'थ',rom:'tha',place:'Dental',   placeS:'Dantya',   manner:2,mannerS:'Mahāprāṇa karkasha', desc:'Aspirated voiceless dental stop'},
  {dev:'द',rom:'da', place:'Dental',   placeS:'Dantya',   manner:3,mannerS:'Alpaprāṇa mṛdu',    desc:'Non-aspirated voiced dental stop'},
  {dev:'ध',rom:'dha',place:'Dental',   placeS:'Dantya',   manner:4,mannerS:'Mahāprāṇa mṛdu',    desc:'Aspirated voiced dental stop'},
  {dev:'न',rom:'na', place:'Dental',   placeS:'Dantya',   manner:5,mannerS:'Anunāsika',         desc:'Voiced dental nasal'},
  {dev:'प',rom:'pa', place:'Labial',   placeS:'Oṣṭhya',  manner:1,mannerS:'Alpaprāṇa karkasha',desc:'Non-aspirated voiceless bilabial stop'},
  {dev:'फ',rom:'pha',place:'Labial',   placeS:'Oṣṭhya',  manner:2,mannerS:'Mahāprāṇa karkasha', desc:'Aspirated voiceless bilabial stop'},
  {dev:'ब',rom:'ba', place:'Labial',   placeS:'Oṣṭhya',  manner:3,mannerS:'Alpaprāṇa mṛdu',    desc:'Non-aspirated voiced bilabial stop'},
  {dev:'भ',rom:'bha',place:'Labial',   placeS:'Oṣṭhya',  manner:4,mannerS:'Mahāprāṇa mṛdu',    desc:'Aspirated voiced bilabial stop'},
  {dev:'म',rom:'ma', place:'Labial',   placeS:'Oṣṭhya',  manner:5,mannerS:'Anunāsika',         desc:'Voiced bilabial nasal'},
];

// ── UNCLASSIFIED (9)
const UNCLASSIFIED=[
  {dev:'य',rom:'ya', place:'SemiVowel',placeS:'Antasthā', manner:0,mannerS:'Antasthā · semi-vowel',desc:'Voiced palatal approximant'},
  {dev:'र',rom:'ra', place:'SemiVowel',placeS:'Antasthā', manner:0,mannerS:'Antasthā · semi-vowel',desc:'Voiced retroflex flap'},
  {dev:'ल',rom:'la', place:'SemiVowel',placeS:'Antasthā', manner:0,mannerS:'Antasthā · semi-vowel',desc:'Voiced dental lateral approximant'},
  {dev:'व',rom:'va', place:'SemiVowel',placeS:'Antasthā', manner:0,mannerS:'Antasthā · semi-vowel',desc:'Voiced labio-dental approximant'},
  {dev:'श',rom:'śa', place:'Sibilant', placeS:'Ūṣmāṇa',  manner:0,mannerS:'Ūṣmāṇa · sibilant',   desc:'Voiceless palatal fricative'},
  {dev:'ष',rom:'ṣa', place:'Sibilant', placeS:'Ūṣmāṇa',  manner:0,mannerS:'Ūṣmāṇa · sibilant',   desc:'Voiceless retroflex fricative'},
  {dev:'स',rom:'sa', place:'Sibilant', placeS:'Ūṣmāṇa',  manner:0,mannerS:'Ūṣmāṇa · sibilant',   desc:'Voiceless dental fricative'},
  {dev:'ह',rom:'ha', place:'Aspirate', placeS:'Ūṣmāṇa',  manner:0,mannerS:'Aspirate',             desc:'Voiced glottal fricative'},
  {dev:'ळ',rom:'ḷa', place:'SemiVowel',placeS:'Antasthā', manner:0,mannerS:'Antasthā · Vedic',    desc:'Voiced retroflex lateral · Vedic form'},
];

// ── RADII
const K={ctrR:44,vI:50,vO:114,mI:118,mO:232,nmI:236,nmO:374,plR:388,rim:400};
const mBand=(K.mO-K.mI)/5;

// ── ANGULAR LAYOUT
const GG=4,UG=6,SG=0.4;
const avail=360-(4*GG+UG), segW=avail/34;
let cur=0;
const GROUPS=[
  {label:'KAṆṬHYA',  labelDev:'कण्ठ्य',  items:CLASSIFIED.slice(0,5)},
  {label:'TĀLAVYA',  labelDev:'तालव्य',  items:CLASSIFIED.slice(5,10)},
  {label:'MŪRDHANYA',labelDev:'मूर्धन्य',items:CLASSIFIED.slice(10,15)},
  {label:'DANTYA',   labelDev:'दन्त्य',  items:CLASSIFIED.slice(15,20)},
  {label:'OṢṬHYA',   labelDev:'ओष्ठ्य',  items:CLASSIFIED.slice(20,25)},
  {label:'AVARGĪYA', labelDev:'अवर्गीय', items:UNCLASSIFIED},
];
const segs=[];
GROUPS.forEach((grp,gi)=>{
  grp.aStart=cur;
  grp.items.forEach(item=>{ segs.push({data:item,aS:cur,aE:cur+segW,grp:grp.label}); cur+=segW; });
  grp.aEnd=cur;
  if(gi<4) cur+=GG; else if(gi===4) cur+=GG+UG;
});
const vSegW=360/VOWELS.length;

// ── SVG HELPERS
const SV=document.getElementById('svg'), NS='http://www.w3.org/2000/svg';
const mk=(t,a={})=>{const e=document.createElementNS(NS,t);for(const[k,v] of Object.entries(a))e.setAttribute(k,v);return e;};
function AP(r1,r2,aS,aE){
  const s=(aS-90)*Math.PI/180,e2=(aE-90)*Math.PI/180,lg=(aE-aS)>180?1:0;
  const P=(r,a)=>`${+(r*Math.cos(a)).toFixed(3)},${+(r*Math.sin(a)).toFixed(3)}`;
  return `M${P(r1,s)}L${P(r2,s)}A${r2},${r2},0,${lg},1,${P(r2,e2)}L${P(r1,e2)}A${r1},${r1},0,${lg},0,${P(r1,s)}Z`;
}

// ── BUILD
function redraw(){ while(SV.firstChild) SV.removeChild(SV.firstChild); buildChart(); }

function buildChart(){
  const light=isLight;
  const opMult=light?1.2:1.0;

  // Background glow
  const defs=mk('defs');
  const rg=mk('radialGradient',{id:'bg',cx:'50%',cy:'50%',r:'50%'});
  [[0,cv('--glow-a')],[.5,cv('--glow-b')],[1,'rgba(0,0,0,0)']].forEach(([o,c])=>{
    const s=mk('stop',{offset:o});s.setAttribute('stop-color',c);rg.appendChild(s);});
  defs.appendChild(rg); SV.appendChild(defs);
  SV.appendChild(mk('circle',{cx:0,cy:0,r:K.rim+16,fill:'url(#bg)'}));

  // Ring borders
  const RB=cv('--ring-bold'), RS=cv('--ring-soft');
  [K.vI,K.vO,K.mI,K.mO,K.nmI,K.nmO].forEach(r=>{
    const b=(r===K.vO||r===K.mI||r===K.nmO);
    SV.appendChild(mk('circle',{cx:0,cy:0,r,fill:'none',stroke:b?RB:RS,'stroke-width':b?1.3:0.55}));
  });
  for(let m=1;m<5;m++)
    SV.appendChild(mk('circle',{cx:0,cy:0,r:K.mI+m*mBand,fill:'none',stroke:RS,'stroke-width':0.45}));
  SV.appendChild(mk('circle',{cx:0,cy:0,r:K.rim,fill:'none',stroke:cv('--rim'),'stroke-width':2.5}));

  // Layers
  const gV=mk('g'),gM=mk('g'),gNm=mk('g'),gLbl=mk('g'),gHit=mk('g');
  [gV,gM,gNm,gLbl,gHit].forEach(g=>SV.appendChild(g));

  // ── Consonant segments
  segs.forEach(seg=>{
    const{data:r,aS,aE}=seg;
    const col=PC[r.place]||'#a0a8b0';
    const midA=(aS+aE)/2, mRad=(midA-90)*Math.PI/180;
    const flip=midA>180, rot=flip?midA-90+180:midA-90;
    const s=aS+SG/2, e=aE-SG/2;

    // Manner sub-ring
    if(r.manner>=1&&r.manner<=5){
      const mi=r.manner-1;
      const r1=K.mI+mi*mBand+0.5, r2=K.mI+(mi+1)*mBand-0.5;
      gM.appendChild(mk('path',{d:AP(r1,r2,s,e),fill:col,
        'fill-opacity':Math.min(1,MANNER_OP[mi]*opMult),
        stroke:col,'stroke-width':0.35,'stroke-opacity':0.4}));
    } else {
      gM.appendChild(mk('path',{d:AP(K.mI,K.mO,s,e),fill:col,
        'fill-opacity':Math.min(1,parseFloat(cv('--mbnd-opacity'))*opMult),
        stroke:col,'stroke-width':0.35,'stroke-opacity':0.4}));
    }

    // Name band
    gNm.appendChild(mk('path',{d:AP(K.nmI,K.nmO,s,e),fill:col,
      'fill-opacity':parseFloat(cv('--nm-opacity')),
      stroke:col,'stroke-width':0.4,'stroke-opacity':0.28}));

    // Devanāgarī
    const devR=K.nmI+(K.nmO-K.nmI)*0.40;
    const[dx,dy]=[devR*Math.cos(mRad),devR*Math.sin(mRad)];
    const dt=mk('text',{x:dx,y:dy,fill:cv('--name-fill'),
      'font-family':'Noto Serif Devanagari,serif','font-size':'21','font-weight':'500',
      'text-anchor':'middle','dominant-baseline':'middle',transform:`rotate(${rot},${dx},${dy})`});
    dt.textContent=r.dev; gLbl.appendChild(dt);

    // Romanization
    const romR=K.nmI+(K.nmO-K.nmI)*0.70;
    const[rx,ry]=[romR*Math.cos(mRad),romR*Math.sin(mRad)];
    const rt=mk('text',{x:rx,y:ry,fill:`${col}${cv('--rom-opacity')}`,
      'font-family':'EB Garamond,serif','font-style':'italic','font-size':'9.5',
      'text-anchor':'middle','dominant-baseline':'middle',transform:`rotate(${rot},${rx},${ry})`});
    rt.textContent=r.rom; gLbl.appendChild(rt);

    // Hit
    const hit=mk('path',{d:AP(K.mI,K.nmO,s,e),fill:'transparent',stroke:'none',cursor:'pointer'});
    hit.addEventListener('mouseenter',e2=>{showTT(e2,r,col);hit.setAttribute('fill',cv('--hit-hover'));});
    hit.addEventListener('mousemove',moveTT);
    hit.addEventListener('mouseleave',()=>{hideTT();hit.setAttribute('fill','transparent');});
    gHit.appendChild(hit);
  });

  // ── Group dividers + place labels
  GROUPS.forEach((grp,gi)=>{
    const dA=(grp.aStart-90)*Math.PI/180;
    SV.appendChild(mk('line',{
      x1:+(K.vO*Math.cos(dA)).toFixed(2),y1:+(K.vO*Math.sin(dA)).toFixed(2),
      x2:+(K.nmO*Math.cos(dA)).toFixed(2),y2:+(K.nmO*Math.sin(dA)).toFixed(2),
      stroke:cv('--divider'),'stroke-width':1.2}));
    const midA=(grp.aStart+grp.aEnd)/2, ar=(midA-90)*Math.PI/180;
    const flip=midA>180, rot=flip?midA-90+180:midA-90;
    const[cx,cy]=[K.plR*Math.cos(ar),K.plR*Math.sin(ar)];
    const col=PC[grp.items[0]?.place]||cv('--header-title');
    const ct=mk('text',{x:cx,y:cy,fill:col,'font-family':'Cinzel,serif','font-size':'7.8',
      'font-weight':'600','letter-spacing':'0.8','text-anchor':'middle','dominant-baseline':'middle',
      transform:`rotate(${rot},${cx},${cy})`});
    ct.textContent=grp.label; SV.appendChild(ct);
    const[cx2,cy2]=[(K.plR+13)*Math.cos(ar),(K.plR+13)*Math.sin(ar)];
    const ct2=mk('text',{x:cx2,y:cy2,fill:`${col}55`,'font-family':'Noto Serif Devanagari,serif',
      'font-size':'7','text-anchor':'middle','dominant-baseline':'middle',
      transform:`rotate(${rot},${cx2},${cy2})`});
    ct2.textContent=grp.labelDev; SV.appendChild(ct2);
  });
  // Final divider
  const lastA=(segs[segs.length-1].aE-90)*Math.PI/180;
  SV.appendChild(mk('line',{
    x1:+(K.vO*Math.cos(lastA)).toFixed(2),y1:+(K.vO*Math.sin(lastA)).toFixed(2),
    x2:+(K.nmO*Math.cos(lastA)).toFixed(2),y2:+(K.nmO*Math.sin(lastA)).toFixed(2),
    stroke:cv('--divider'),'stroke-width':1.2}));

  // ── Manner sub-ring labels
  const mLabels=['Hard·Non-asp','Hard·Asp','Soft·Non-asp','Soft·Asp','Nasal'];
  mLabels.forEach((lbl,mi)=>{
    const r=K.mI+(mi+0.5)*mBand, ang=359.6, a=(ang-90)*Math.PI/180;
    const[x,y]=[r*Math.cos(a),r*Math.sin(a)];
    const t=mk('text',{x,y,fill:cv('--badge-text'),'font-family':'Cinzel,serif',
      'font-size':'5.2','font-weight':'600','text-anchor':'middle','dominant-baseline':'middle',
      transform:`rotate(${ang-90},${x},${y})`});
    t.textContent=lbl; SV.appendChild(t);
  });

  // ── Vowel ring
  VOWELS.forEach((v,i)=>{
    const aS=i*vSegW+0.3, aE=(i+1)*vSegW-0.3, midA=(aS+aE)/2;
    const mRad=(midA-90)*Math.PI/180, flip=midA>180, rot=flip?midA-90+180:midA-90;
    const col=VC[v.type];
    gV.appendChild(mk('path',{d:AP(K.vI,K.vO,aS,aE),fill:col,
      'fill-opacity':parseFloat(cv('--v-opacity')),
      stroke:col,'stroke-width':0.5,'stroke-opacity':0.55}));
    const devR=(K.vI+K.vO)/2-1, [dx,dy]=[devR*Math.cos(mRad),devR*Math.sin(mRad)];
    const dt=mk('text',{x:dx,y:dy,fill:cv('--name-fill'),
      'font-family':'Noto Serif Devanagari,serif','font-size':'15','font-weight':'400',
      'text-anchor':'middle','dominant-baseline':'middle',transform:`rotate(${rot},${dx},${dy})`});
    dt.textContent=v.dev; gLbl.appendChild(dt);
    const hit=mk('path',{d:AP(K.vI,K.vO,aS,aE),fill:'transparent',stroke:'none',cursor:'pointer'});
    hit.addEventListener('mouseenter',e2=>{
      showTT(e2,{...v,place:'Svara',mannerS:v.skt},VC[v.type]);
      hit.setAttribute('fill',cv('--hit-hover'));});
    hit.addEventListener('mousemove',moveTT);
    hit.addEventListener('mouseleave',()=>{hideTT();hit.setAttribute('fill','transparent');});
    gHit.appendChild(hit);
  });

  // ── Centre
  SV.appendChild(mk('circle',{cx:0,cy:0,r:K.ctrR,fill:cv('--ctr-fill'),stroke:cv('--ctr-stroke'),'stroke-width':1.5}));
  SV.appendChild(mk('circle',{cx:0,cy:0,r:K.ctrR-8,fill:'none',stroke:cv('--ctr-inner'),'stroke-width':0.8}));
  const omT=mk('text',{x:0,y:5,fill:cv('--ctr-om'),
    'font-family':'Noto Serif Devanagari,serif','font-size':'28','font-weight':'300',
    'text-anchor':'middle','dominant-baseline':'middle'});
  omT.textContent='ॐ'; SV.appendChild(omT);
}

// ── PHONEME KEY DATA (vowels + consonants)
const TRANSLIT_KEY = {
  // ── Vowels
  'a':   { word:'about',      highlight:'a'  },
  'ā':   { word:'calm',       highlight:'a'  },
  'i':   { word:'little',     highlight:'i'  },
  'ī':   { word:'green',      highlight:'ee' },
  'u':   { word:'put',        highlight:'u'  },
  'ū':   { word:'moon',       highlight:'oo' },
  'ṛ':   { word:'Krishna',    highlight:'r'  },
  'ṝ':   null,                               // rare — long ṛ, no English equiv
  'ḷ':   null,                               // rare Vedic vowel
  'e':   { word:'day',        highlight:'a'  },
  'ai':  { word:'light',      highlight:'i'  },
  'o':   { word:'home',       highlight:'o'  },
  'au':  { word:'flower',     highlight:'ow' },
  'aṃ':  { word:'Om',         highlight:'m'  },
  'aḥ':  { word:'aha',        highlight:'h'  },

  // ── Gutturals (ka-varga)
  'ka':  { word:'kind',       highlight:'k'  },
  'kha': { word:'backhand',   highlight:'kh' },
  'ga':  { word:'garden',     highlight:'g'  },
  'gha': { word:'loghouse',   highlight:'gh' },
  'ṅa':  { word:'single',     highlight:'ng' },

  // ── Palatals (ca-varga)
  'ca':  { word:'cheer',      highlight:'ch' },
  'cha': { word:'churchhall', highlight:'ch' },
  'ja':  { word:'joy',        highlight:'j'  },
  'jha': { word:'bridgehead', highlight:'dh' },
  'ña':  { word:'canyon',     highlight:'ny' },

  // ── Cerebrals (ṭa-varga)
  'ṭa':  { word:'stable',     highlight:'t'  },
  'ṭha': { word:'lighthouse', highlight:'th' },
  'ḍa':  { word:'ladder',     highlight:'dd' },
  'ḍha': { word:'redhill',    highlight:'dh' },
  'ṇa':  { word:'corner',     highlight:'rn' },

  // ── Dentals (ta-varga)
  'ta':  { word:'path',       highlight:'th' },
  'tha': { word:'thrive',     highlight:'th' },
  'da':  { word:'that',       highlight:'th' },
  'dha': { word:'breathe',    highlight:'the'},
  'na':  { word:'nature',     highlight:'n'  },

  // ── Labials (pa-varga)
  'pa':  { word:'peace',      highlight:'p'  },
  'pha': { word:'uphill',     highlight:'ph' },
  'ba':  { word:'bloom',      highlight:'bl' },
  'bha': { word:'clubhouse',  highlight:'bh' },
  'ma':  { word:'morning',    highlight:'m'  },

  // ── Semi-vowels (antasthā)
  'ya':  { word:'yoga',       highlight:'y'  },
  'ra':  { word:'river',      highlight:'r'  },
  'la':  { word:'light',      highlight:'l'  },
  'va':  { word:'victory',    highlight:'v'  },
  'ḷa':  { word:'bottle',     highlight:'tt' },  // Vedic ḻ

  // ── Sibilants (ūṣmāṇa)
  'śa':  { word:'shine',      highlight:'sh' },
  'ṣa':  { word:'shower',     highlight:'sh' },
  'sa':  { word:'sun',        highlight:'s'  },

  // ── Aspirate
  'ha':  { word:'harmony',    highlight:'h'  },

  // ── Conjuncts / special
  'kṣa': { word:'Lakshmi',    highlight:'ksh'},
  'tra': { word:'three',      highlight:'thr'},
  'jña': null,                               // unique Sanskrit sound
};

function buildTranslitHTML(rom) {
  if (!(rom in TRANSLIT_KEY)) return '';
  const entry = TRANSLIT_KEY[rom];
  let inner;
  if (!entry) {
    inner = `<span class="tt-translit-unique">Unique Sanskrit sound — no exact English equivalent</span>`;
  } else {
    const { word, highlight } = entry;
    const idx = word.toLowerCase().indexOf(highlight.toLowerCase());
    if (idx === -1) {
      inner = `<span class="tt-translit-word">${word}</span>`;
    } else {
      const before = word.slice(0, idx);
      const match  = word.slice(idx, idx + highlight.length);
      const after  = word.slice(idx + highlight.length);
      inner = `<span class="tt-translit-word">${before}<span class="ph-hi">${match}</span>${after}</span>`;
    }
  }
  return `<div class="tt-translit-wrap">
    <div class="tt-translit-head">Sounds like · English key</div>
    ${inner}
  </div>`;
}

// ── TOOLTIP
const ttEl=document.getElementById('tt');
function showTT(e,r,col){
  const isVowel=r.place==='Svara';
  ttEl.innerHTML=`
    <div class="tt-cat">${isVowel?'SVARA · VOWEL':`VYAÑJANA · ${(r.placeS||r.place).toUpperCase()}`}</div>
    <div class="tt-dev">${r.dev}</div>
    <div class="tt-rom">${r.rom}</div>
    <div class="tt-name">${r.mannerS||r.skt||''}</div>
    <div class="tt-desc">${r.desc||''}</div>
    ${buildTranslitHTML(isVowel ? r.rom : r.rom)}
    <span class="tt-tag" style="border-color:${col}55;color:${col}">${r.placeS||r.place}</span>`;
  ttEl.classList.add('on'); moveTT(e);
}
function moveTT(e){
  let x=e.clientX+15,y=e.clientY+15;
  if(x+270>window.innerWidth) x=e.clientX-280;
  if(y+190>window.innerHeight) y=e.clientY-200;
  ttEl.style.left=x+'px'; ttEl.style.top=y+'px';
}
function hideTT(){ ttEl.classList.remove('on'); }

[
  {col:'#f5c030',lbl:'Short vowel · hṛsva'},

  {col:'#60b0f0',lbl:'Diphthong · plūta'},
  {col:'#b088e0',lbl:'Special · anusvāra / visarga'},
  null,
  {col:PC.Guttural, lbl:'Guttural · Kaṇṭhya'},

  {col:PC.Cerebral, lbl:'Cerebral · Mūrdhanya'},
  {col:PC.Dental,   lbl:'Dental · Dantya'},
  {col:PC.Labial,   lbl:'Labial · Oṣṭhya'},
  {col:PC.SemiVowel,lbl:'Semi-vowel · Antasthā'},
  {col:PC.Sibilant, lbl:'Sibilant · Ūṣmāṇa'},

].forEach(item=>{

    const d=document.createElement('div');d.className='leg-div';
    d.textContent='── Consonants by place ──';footer.appendChild(d);return;
  }
  const d=document.createElement('div');d.className='leg';
  d.innerHTML=`<div class="leg-dot" style="background:${item.col}"></div>${item.lbl}`;
  footer.appendChild(d);
});
